<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAP Table visualizer</title>

    <!-- Load Cytoscape, Data (DATA)-->
    <script src="cytoscape.min.js"></script>
    <script src="data.js"></script>
    <script src="search.js"></script>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="main-wrapper">
      <div id="cy"></div>

      <div class="sidebar">
        <div class="controls">
          <label for="stepCount"><b>Steps (Depth):</b></label
          ><br />
          <input type="number" id="stepCount" value="1" min="0" max="10" />

          <br />
          <label for="tableSearch"><b>Search Table:</b></label>
          <input
            list="tableNames"
            id="tableSearch"
            placeholder="e.g. FKKVKP"
            value="FKKVKP"
          />
          <datalist id="tableNames"></datalist>

          <label for="searchInput"><b>Filter Fields:</b></label>
          <input type="text" id="searchInput" placeholder="e.g. name..." />
        </div>

        <div id="attributeBox">
          <i>Click a node to see details...</i>
        </div>
      </div>
    </div>

    <script>
      // ----------------------------------------------------------
      // search.js enthält buildFieldIndex() und searchNodesByField()
      // Index für schnelle Attributsuche: key = Attribut, value = Set von Node-IDs
      let attrIndex = buildFieldIndex(DATA);

      // ----------------------------------------------------------
      // init Cytoscape
      let elements = [];
      let addedNodes = new Set();
      let addedEdges = new Set();

      for (const [name, content] of Object.entries(DATA)) {
        if (!addedNodes.has(name)) {
          elements.push({ data: { id: name, label: name } });
          addedNodes.add(name);
        }

        const relations = content.fk;
        relations.forEach((target) => {
          if (!target) return;

          // Target-Node hinzufügen, falls noch nicht existent
          if (!addedNodes.has(target)) {
            elements.push({ data: { id: target, label: target } });
            addedNodes.add(target);
          }

          const edgeKey = `${name}->${target}`;
          if (!addedEdges.has(edgeKey)) {
            elements.push({
              data: {
                id: edgeKey,
                source: name,
                target: target,
              },
            });
            addedEdges.add(edgeKey);
          }
        });
      }

      // Versteckten Cytoscape-Instanz erstellen, um alle Elemente zu halten
      var hiddenCy = cytoscape({
        container: document.createElement("div"),
        elements: elements,
        layout: { name: "preset" },
      });

      var cy = cytoscape({
        container: document.getElementById("cy"),
        elements: [],
        style: [
          {
            selector: "node",
            style: {
              label: "data(label)",
              "background-color": "#2c3e50",
              color: "#fff",
              "font-family": "Helvetica, Arial, sans-serif",
              "font-size": "8px",
              "text-valign": "center",
              "text-halign": "center",
              width: "35px",
              height: "35px",
              "z-index": 10,

              "text-outline-width": 2,
              "text-outline-color": "#2c3e50",
            },
          },
          {
            selector: "edge",
            style: {
              "line-color": "#ccc",
              width: 2,
              "target-arrow-color": "#ccc",
              "target-arrow-shape": "triangle",
              "curve-style": "bezier",
            },
          },
          {
            selector: "node:selected",
            style: {
              "background-color": "#0074D9",
              width: "40px",
              height: "40px",
              "font-size": "10px",
            },
          },
        ],
      });

      // on tap event für Knoten
      cy.on("tap", "node", function (evt) {
        const nodeId = evt.target.id();
        const searchTerm = searchInput.value.trim();

        // Finde den Node in DATA
        const nodeData = DATA[nodeId];
        const attrDiv = document.getElementById("attributeBox");

        let html = `<b>${nodeId}</b><br>`;

        if (nodeData) {
          const fields = [];
          nodeData["f"].forEach((fieldName) => {
            if (
              searchTerm &&
              fieldName.toLowerCase().includes(searchTerm.toLowerCase())
            ) {
              const highlightedField = `<span style="color: red; font-weight: bold;">${fieldName}</span>`;
              fields.push(highlightedField);
            } else {
              fields.push(fieldName);
            }
          });

          html += "<br><b>Fields:</b><br>";
          html += fields.join("<br>") + "<br>";
        } else {
          html += "No fields found<br>";
        }

        // eingehende und ausgehende Verbindungen anzeigen
        const outgoingNodes = evt.target.outgoers("node").map((n) => n.id());
        const incomingNodes = evt.target.incomers("node").map((n) => n.id());

        if (outgoingNodes.length > 0) {
          html += "<br><b>Outgoing to:</b><br>" + outgoingNodes.join("<br>");
        } else {
          html += "<br><b>No outgoing connections</b>";
        }

        if (incomingNodes.length > 0) {
          html += "<br><b>Incoming from:</b><br>" + incomingNodes.join("<br>");
        } else {
          html += "<br><b>No incoming connections</b>";
        }

        attrDiv.innerHTML = html;
      });

      //----------------------------------------------------------
      // init
      const searchTable = document.getElementById("tableSearch");
      const searchInput = document.getElementById("searchInput");
      const stepCount = document.getElementById("stepCount");
      let lastValidTable = "";

      // fill search table
      const datalist = document.getElementById("tableNames");
      const names = Object.keys(DATA).sort();
      names.forEach((name) => {
        const option = document.createElement("option");
        option.value = name; // Das ist der Wert, der im Input landet
        datalist.appendChild(option);
      });

      // init Listeners
      const namesSet = new Set(names);
      namesSet.add("");
      searchTable.addEventListener("change", () => {
        const val = searchTable.value;
        if (namesSet.has(val)) {
          lastValidTable = val;
          applyFilter();
        }
      });
      searchTable.dispatchEvent(new Event("change"));

      searchTable.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          const val = searchTable.value.trim().toUpperCase();
          searchTable.value = val;
        }
      });

      searchInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          applyFilter();
        }
      });

      stepCount.addEventListener("input", function () {
        applyFilter();
      });

      // -------------------------------------------
      function applyFilter() {
        const maxDepth = parseInt(stepCount.value);
        const searchTerm = searchInput.value.trim();
        let validNodesSet;

        // 1. Suche nach Roots
        let roots = [];
        if (lastValidTable) {
          roots = [lastValidTable];
          validNodesSet = searchNodesByField(attrIndex, searchTerm);
        } else {
          roots = searchNodesByField(attrIndex, searchTerm);
          validNodesSet = names;
        }
        console.log(validNodesSet);
        validNodesSet = new Set(validNodesSet);

        // 2. BFS (Alle Nodes)
        let allFoundNodes = new Set();
        let queue = [];
        roots.forEach((r) => {
          if (DATA[r]) queue.push({ id: r, depth: 0 });
        });

        while (queue.length > 0) {
          const { id, depth } = queue.shift();

          if (allFoundNodes.has(id)) continue;
          allFoundNodes.add(id);

          if (depth < maxDepth) {
            const nodeData = DATA[id];
            if (nodeData && nodeData.fk) {
              nodeData.fk.forEach((targetId) => {
                // Nachbar in die Queue, falls noch nicht besucht
                if (!allFoundNodes.has(targetId)) {
                  queue.push({ id: targetId, depth: depth + 1 });
                }
              });
            }
          }
        }

        /// 3. HIER: Erst jetzt filtern wir die Ergebnisse
        let visibleNodes = new Set();
        allFoundNodes.forEach((nodeId) => {
          // Nur Knoten behalten, die in den Suchergebnissen (validNodesSet) sind
          if (validNodesSet.has(nodeId)) {
            visibleNodes.add(nodeId);
          }
        });

        // 3. Alle Edges
        let visibleEdges = new Set();
        visibleNodes.forEach((nodeId) => {
          const node = hiddenCy.getElementById(nodeId);
          node.outgoers("edge").forEach((edge) => {
            if (visibleNodes.has(edge.data("target"))) {
              visibleEdges.add(edge.id());
            }
          });
        });

        // 4. Datenstruktur für Cytoscape bauen
        let newElements = [];
        visibleNodes.forEach((nodeId) => {
          const node = hiddenCy.getElementById(nodeId);
          newElements.push({
            data: { id: node.id(), label: node.data("label") },
          });
        });
        visibleEdges.forEach((edgeId) => {
          const edge = hiddenCy.getElementById(edgeId);
          newElements.push({
            data: {
              id: edge.id(),
              source: edge.data("source"),
              target: edge.data("target"),
            },
          });
        });

        // 5. Graph laden
        reloadGraph(newElements);
      }

      function reloadGraph(elements) {
        // Batch starten: Keine Zwischen-Renders
        cy.batch(() => {
          cy.elements().remove();
          cy.add(elements);

          const padding = 80;
          let currentX = 0;

          // Hole alle unverbundenen Teile des Graphen
          const components = cy.elements().components();
          components.forEach((comp) => {
            comp
              .layout({
                name: "concentric",
                concentric: (node) => node.outgoers("edge").length,
                levelWidth: () => 2,
                animate: false,
                fit: false,
              })
              .run();

            const bb = comp.boundingBox();
            const offsetX = currentX - bb.x1;
            comp.nodes().shift({ x: offsetX });

            // X-Pointer weiterschieben
            currentX += bb.x2 - bb.x1 + padding;
          });
        });

        cy.fit(undefined, 50);
      }
    </script>
  </body>
</html>
